[tool.ruff]
line-length = 110
target-version = "py311"
# Les notebooks d'exploration ne sont pas soumis au lint de production.
exclude = ["notebooks"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
